<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="description" content="i'm Sameh And This Site Is On Crud Operations">
        <meta name="keywords" content="Sameh, Head, Crud, Cruds">
        <meta name="viewport" content="width=device-width, initial-scale = 1.0">
        <meta name="copyright" content="Sameh Nasrallah">

        <title>
            CRUDS | SAMEH NASRALLAH
        </title>
        <style type="text/css">

        </style>
        <link rel="stylesheet" href="style.css">
        <link rel="scriptsheet" href="script.js">
    </head>
    <body>
     <div class="crud">
        <div class="head">
            <h2>CRUD</h2>
            <p>PRODUCT MANAGEMENT SYSTEM</p>
        </div>


        <div class="inputs">
            <input type="text" id="title" placeholder="title">
            <div class="price">
                <input onkeyup="getTotal()" type="number" id="price" placeholder="price">
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="taxes">
                <input onkeyup="getTotal()" type="number" id="ads" placeholder="ads">
                <input onkeyup="getTotal()" type="number" id="discount" placeholder="discount">
                <small id="total"></small>
            </div>
            <input type="number" id="count" placeholder="count">
            <input type="text" id="category" placeholder="category">
            <button id="submit">Create</button>
        </div>


        <div class="outputs">
            <div class="searchBlock">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
                <div class="btnSearch">
                    <button onclick="getSearchMood(this.id)" id="searchTitle">Search By Title</button>
                    <button onclick="getSearchMood(this.id)" id="searchCategory">Search By  Category</button>
                </div>
            </div>
            <div id="deleteAll">

            </div>
            <table>
                <thead id="thead">
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>discount</th>
                        <th>total</th>
                        <th>category</th>
                        <th>update</th>
                        <th>delete</th>
                    </tr>
                </thead>
                <tbody id="tbody">

                </tbody>
            </table>
        </div>
     </div>   
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
